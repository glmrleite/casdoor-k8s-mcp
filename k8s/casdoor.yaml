apiVersion: apps/v1
kind: Deployment
metadata:
  name: casdoor
  namespace: casdoor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: casdoor
  template:
    metadata:
      labels:
        app: casdoor
    spec:
      containers:
        - name: casdoor
          image: casbin/casdoor:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: RUNNING_IN_DOCKER
              value: "true"
          volumeMounts:
            - name: config
              mountPath: /conf
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: casdoor-config

---
apiVersion: v1
kind: Service
metadata:
  name: casdoor-svc
  namespace: casdoor
  labels:
    app: casdoor
spec:
  type: NodePort
  selector:
    app: casdoor
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
